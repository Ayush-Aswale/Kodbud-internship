<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google</title>
<style>
  *{ box-sizing: border-box; }
  html, body{
    margin: 0;
    height: 100%;
    font-family: arial, sans-serif;
    color: #1f1f1f;
  }
  body{
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  a{ color: inherit; text-decoration: none; }

  /* ===================== Header ===================== */
  header{
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 20px;
    padding: 20px 28px 0;
    font-size: 13px;
  }
  .header-links{
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .header-links a{
    color: #1f1f1f;
    padding: 8px 0;
  }
  .header-links a:hover{
    text-decoration: underline;
  }

  .icon-btn{
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
  }
  .icon-btn:hover{
    background-color: #f1f3f4;
  }

  /* 9-dot apps grid icon, built with CSS only */
  .apps-grid{
    width: 16px;
    height: 16px;
    display: grid;
    grid-template-columns: repeat(3, 4px);
    grid-template-rows: repeat(3, 4px);
    gap: 2px;
  }
  .apps-grid span{
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background-color: #5f6368;
  }

  .signin-btn{
    background-color: #1a73e8;
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    padding: 9px 23px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .signin-btn:hover{
    background-color: #1665c8;
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
    text-decoration: none;
  }

  /* ===================== Main ===================== */
  main{
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-bottom: 14vh;
  }

  .logo{
    font-size: 90px;
    font-weight: 400;
    letter-spacing: -3px;
    margin: 0 0 28px;
    user-select: none;
  }
  .logo span:nth-child(1){ color: #4285F4; } /* G */
  .logo span:nth-child(2){ color: #EA4335; } /* o */
  .logo span:nth-child(3){ color: #FBBC05; } /* o */
  .logo span:nth-child(4){ color: #4285F4; } /* g */
  .logo span:nth-child(5){ color: #34A853; } /* l */
  .logo span:nth-child(6){ color: #EA4335; } /* e */

  .search-wrap{
    width: 100%;
    max-width: 584px;
    padding: 0 16px;
  }

  .search-bar{
    display: flex;
    align-items: center;
    gap: 12px;
    height: 44px;
    padding: 0 14px;
    border: 1px solid #ebebeb;
    border-radius: 24px;
    background-color: #fff;
  }
  .search-bar:hover, .search-bar:focus-within{
    box-shadow: 0 1px 6px rgba(32,33,36,0.28);
    border-color: rgba(223,225,229,0);
  }

  .search-icon{ flex-shrink: 0; }
  .search-bar input{
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    background: transparent;
  }
  .search-actions{
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .btn-row{
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 28px;
  }
  .gbtn{
    background-color: #f8f9fa;
    border: 1px solid #f8f9fa;
    border-radius: 4px;
    color: #3c4043;
    font-size: 14px;
    padding: 0 16px;
    height: 36px;
    cursor: pointer;
  }
  .gbtn:hover{
    box-shadow: 0 1px 1px rgba(0,0,0,0.1);
    background-color: #f8f9fa;
    border: 1px solid #dadce0;
    color: #202124;
  }

  .lang-row{
    margin-top: 24px;
    font-size: 13px;
    color: #1f1f1f;
  }
  .lang-row a{ margin: 0 4px; }
  .lang-row a:hover{ text-decoration: underline; }

  /* ===================== Footer ===================== */
  footer{
    font-size: 14px;
    background-color: #f2f2f2;
  }
  .footer-location{
    padding: 14px 28px;
    border-bottom: 1px solid #dadce0;
    color: #4d5156;
  }
  .footer-links{
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    padding: 0 28px;
  }
  .footer-links ul{
    list-style: none;
    display: flex;
    margin: 0;
    padding: 0;
  }
  .footer-links li{
    padding: 14px 16px;
  }
  .footer-links a{
    color: #4d5156;
  }
  .footer-links a:hover{
    text-decoration: underline;
  }

  /* ===================== Responsive ===================== */
  @media (max-width: 600px){
    .logo{ font-size: 64px; }
    .header-links{ display: none; }
    .footer-links{ flex-direction: column; }
    .footer-links ul{ flex-direction: column; }
    .footer-links li{ padding: 10px 0; }
  }
</style>
</head>
<body>

<header>
  <nav class="header-links" aria-label="Google apps">
    <a href="#">Gmail</a>
    <a href="#">Images</a>
  </nav>
  <button class="icon-btn" aria-label="Google apps" title="Google apps">
    <div class="apps-grid">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
  </button>
  <a href="#" class="signin-btn">Sign in</a>
</header>

<main>
  <h1 class="logo">
    <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
  </h1>

  <div class="search-wrap">
    <div class="search-bar">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Zm10.2 2.7-5.4-5.4" stroke="#4285F4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <input type="text" aria-label="Search" autocomplete="off">
      <div class="search-actions">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-label="Search by voice" title="Search by voice">
          <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z" fill="#4285F4"/>
          <path d="M19 11v1a7 7 0 0 1-14 0v-1" stroke="#34A853" stroke-width="2" stroke-linecap="round" fill="none"/>
          <path d="M12 19v3" stroke="#FBBC05" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-label="Search by image" title="Search by image">
          <rect x="3" y="5" width="18" height="14" rx="2" stroke="#EA4335" stroke-width="2"/>
          <circle cx="9" cy="11" r="1.6" fill="#FBBC05"/>
          <path d="M4 17l5-4 4 3 4-5 4 5" stroke="#4285F4" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="gbtn">Google Search</button>
    <button class="gbtn">I'm Feeling Lucky</button>
  </div>

  <div class="lang-row">
    Google offered in: <a href="#">हिन्दी</a> <a href="#">বাংলা</a> <a href="#">తెలుగు</a> <a href="#">मराठी</a> <a href="#">தமிழ்</a>
  </div>
</main>

<footer>
  <div class="footer-location">India</div>
  <div class="footer-links">
    <ul>
      <li><a href="#">About</a></li>
      <li><a href="#">Advertising</a></li>
      <li><a href="#">Business</a></li>
      <li><a href="#">How Search works</a></li>
    </ul>
    <ul>
      <li><a href="#">Privacy</a></li>
      <li><a href="#">Terms</a></li>
      <li><a href="#">Settings</a></li>
    </ul>
  </div>
</footer>

</body>
</html>
