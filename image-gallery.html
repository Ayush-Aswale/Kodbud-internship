<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Field Light</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Karla:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #16161A;
    --frame: #F5F1E8;
    --ink: #EDEAE2;
    --muted: #9C978C;
    --accent: #C9A24B;
    --serif: 'Cormorant Garamond', serif;
    --sans: 'Karla', sans-serif;
  }

  *{ box-sizing: border-box; }
  body{
    margin: 0;
    background-color: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
  }

  .wrap{ max-width: 1140px; margin: 0 auto; padding: 0 28px; }

  /* ===== Header ===== */
  header{ padding: 64px 0 40px; text-align: center; }
  .eyebrow{
    font-family: var(--sans);
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 14px;
  }
  header h1{
    font-family: var(--serif);
    font-style: italic;
    font-weight: 500;
    font-size: clamp(2.2rem, 5vw, 3.2rem);
    margin: 0 0 12px;
  }
  header p{
    color: var(--muted);
    font-size: 0.95rem;
    max-width: 420px;
    margin: 0 auto;
  }

  /* ===== Gallery grid ===== */
  .gallery{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 36px 28px;
    padding-bottom: 80px;
  }

  .frame{
    background-color: var(--frame);
    padding: 14px 14px 0;
  }

  .photo{
    position: relative;
    overflow: hidden;
    aspect-ratio: 4 / 5;
    background-color: #2a2a2e;
  }
  .photo img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.5s ease;
  }
  .frame:hover .photo img{
    transform: scale(1.06);
  }

  .photo::after{
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.35), transparent 45%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .frame:hover .photo::after{ opacity: 1; }

  .caption{
    padding: 14px 4px 16px;
    border-top: 1px solid rgba(0,0,0,0.08);
    margin-top: 14px;
  }
  .caption .num{
    font-family: var(--sans);
    font-size: 0.66rem;
    letter-spacing: 0.1em;
    color: #8a8578;
    text-transform: uppercase;
  }
  .caption h2{
    font-family: var(--serif);
    font-weight: 600;
    font-size: 1.25rem;
    color: #20201d;
    margin: 4px 0 4px;
  }
  .caption .tag{
    font-size: 0.78rem;
    color: #6b675c;
  }

  .frame{
    transition: box-shadow 0.25s ease, transform 0.25s ease;
  }
  .frame:hover{
    box-shadow: 0 18px 34px rgba(0,0,0,0.45);
    transform: translateY(-4px);
  }

  /* underline reveal on hover, echoes accent color */
  .caption h2 a{
    text-decoration: none;
    color: inherit;
    background-image: linear-gradient(var(--accent), var(--accent));
    background-size: 0% 1px;
    background-repeat: no-repeat;
    background-position: 0 100%;
    transition: background-size 0.25s ease;
    padding-bottom: 2px;
  }
  .frame:hover .caption h2 a{ background-size: 100% 1px; }

  footer{
    text-align: center;
    padding: 28px 0 48px;
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    color: var(--muted);
    border-top: 1px solid rgba(237,234,226,0.1);
  }

  /* ===== Responsive ===== */
  @media (max-width: 900px){
    .gallery{ grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px){
    .gallery{ grid-template-columns: 1fr; gap: 30px; }
    header{ padding: 48px 0 32px; }
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <p class="eyebrow">A small collection</p>
    <h1>Field Light</h1>
    <p>Six frames from recent travels — coastlines, streets, and quiet rooms.</p>
  </div>
</header>

<main class="wrap gallery">

  <figure class="frame">
    <div class="photo">
      <img src="https://picsum.photos/seed/coastal-morning/800/1000" alt="Soft light over a coastal shoreline at sunrise">
    </div>
    <div class="caption">
      <p class="num">No. 01</p>
      <h2><a href="#">Coastal Morning</a></h2>
      <p class="tag">Landscape</p>
    </div>
  </figure>

  <figure class="frame">
    <div class="photo">
      <img src="https://picsum.photos/seed/quiet-streets/800/1000" alt="A narrow, quiet cobblestone street between old buildings">
    </div>
    <div class="caption">
      <p class="num">No. 02</p>
      <h2><a href="#">Quiet Streets</a></h2>
      <p class="tag">Urban</p>
    </div>
  </figure>

  <figure class="frame">
    <div class="photo">
      <img src="https://picsum.photos/seed/desert-bloom/800/1000" alt="A single flowering plant in an open desert landscape">
    </div>
    <div class="caption">
      <p class="num">No. 03</p>
      <h2><a href="#">Desert Bloom</a></h2>
      <p class="tag">Nature</p>
    </div>
  </figure>

  <figure class="frame">
    <div class="photo">
      <img src="https://picsum.photos/seed/glasshouse/800/1000" alt="Sunlight filtering through the glass panes of a greenhouse">
    </div>
    <div class="caption">
      <p class="num">No. 04</p>
      <h2><a href="#">Glasshouse</a></h2>
      <p class="tag">Architecture</p>
    </div>
  </figure>

  <figure class="frame">
    <div class="photo">
      <img src="https://picsum.photos/seed/night-market/800/1000" alt="Lanterns and stalls lit up at a busy night market">
    </div>
    <div class="caption">
      <p class="num">No. 05</p>
      <h2><a href="#">Night Market</a></h2>
      <p class="tag">Street</p>
    </div>
  </figure>

  <figure class="frame">
    <div class="photo">
      <img src="https://picsum.photos/seed/open-water/800/1000" alt="A small boat on calm open water at dusk">
    </div>
    <div class="caption">
      <p class="num">No. 06</p>
      <h2><a href="#">Open Water</a></h2>
      <p class="tag">Seascape</p>
    </div>
  </figure>

</main>

<footer>
  <div class="wrap">Placeholder images via Picsum Photos · © 2026 Field Light</div>
</footer>

</body>
</html>
